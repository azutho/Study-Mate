<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>StudyMate · Student Planner</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Favicon SVG (buku + jam + lampu) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233b82f6' rx='20'/%3E%3Cpath d='M25 30 L45 30 L45 70 L25 70 Q20 70 20 65 L20 35 Q20 30 25 30' fill='white' opacity='0.9'/%3E%3Crect x='48' y='35' width='25' height='35' rx='4' fill='white' opacity='0.9'/%3E%3Ccircle cx='70' cy='52' r='12' fill='none' stroke='white' stroke-width='4' /%3E%3Cpath d='M70 46 L70 54 L76 58' stroke='white' stroke-width='4' fill='none' /%3E%3Cpath d='M32 75 L42 75 L37 85 Z' fill='%23fbbf24' /%3E%3C/svg%3E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f1f5f9;
      transition: background-color 0.3s, color 0.3s;
    }

    #app {
      width: 100%;
      max-width: 400px;
      height: 700px;
      background: var(--bg-primary);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      backdrop-filter: var(--blur-value, none);
      -webkit-backdrop-filter: var(--blur-value, none);
      transition: background 0.2s, backdrop-filter 0.2s;
    }

    /* variabel tema */
    .theme-light {
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --border: #e2e8f0;
      --card-bg: #ffffff;
      --accent: #3b82f6;
      --accent-soft: #dbeafe;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    .theme-dark {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: #334155;
      --card-bg: #1e293b;
      --accent: #60a5fa;
      --accent-soft: #1e3a8a;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5);
    }

    /* layout */
    .app-header {
      padding: 20px 20px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .app-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      flex: 1;
    }

    .app-header i {
      font-size: 1.5rem;
      color: var(--accent);
      cursor: pointer;
    }

    .app-main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-primary);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.75rem;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-item i {
      font-size: 1.3rem;
    }

    /* card tugas */
    .task-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-matkul {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .task-actions i {
      margin-left: 12px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .task-title {
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--text-primary);
    }

    .task-desc {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .task-deadline {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .task-deadline i {
      color: var(--accent);
    }

    .task-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.8rem;
    }

    .task-meta span {
      background: var(--bg-secondary);
      padding: 4px 10px;
      border-radius: 30px;
    }

    .task-check-row {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }

    .task-check-row label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    /* form */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 1rem;
    }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 30px;
      font-weight: 600;
      width: 100%;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* settings */
    .setting-item {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .color-picker {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .color-circle {
      width: 40px;
      height: 40px;
      border-radius: 40px;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .color-circle.selected {
      border-color: var(--accent);
    }

    .blur-slider {
      width: 100%;
      margin: 10px 0;
    }

    /* notif toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      box-shadow: 0 10px 15px -3px black;
      z-index: 1000;
      max-width: 300px;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    (function() {
      // ---------- STATE & STORAGE ----------
      let appState = {
        currentPage: 'setup', // 'setup', 'home', 'add', 'settings'
        nickname: '',
        mataKuliah: [],
        tasks: [],
        settings: {
          theme: 'light',
          bgType: 'color', // 'color' or 'image'
          bgColor: '#ffffff',
          bgImage: null,
          blur: 0,
        },
        sortBy: 'default', // 'default', 'deadline', 'difficulty'
        editTaskId: null, // untuk mode edit
      };

      // Load dari localStorage
      function loadState() {
        try {
          const saved = localStorage.getItem('studymate');
          if (saved) {
            const parsed = JSON.parse(saved);
            appState = { ...appState, ...parsed };
            // pastikan tasks array
            if (!appState.tasks) appState.tasks = [];
            if (!appState.mataKuliah) appState.mataKuliah = [];
          }
        } catch (e) {}
        // jika belum ada nickname, arahkan ke setup
        if (!appState.nickname && appState.currentPage !== 'setup') {
          appState.currentPage = 'setup';
        }
        // pastikan settings lengkap
        if (!appState.settings) {
          appState.settings = { theme: 'light', bgType: 'color', bgColor: '#ffffff', bgImage: null, blur: 0 };
        }
      }

      function saveState() {
        localStorage.setItem('studymate', JSON.stringify(appState));
      }

      // inisialisasi
      loadState();

      // ---------- HELPER FUNCTIONS ----------
      function applyThemeAndBackground() {
        const appDiv = document.getElementById('app');
        if (!appDiv) return;
        // hapus class theme
        appDiv.classList.remove('theme-light', 'theme-dark');
        appDiv.classList.add(`theme-${appState.settings.theme}`);

        // background
        if (appState.settings.bgType === 'color') {
          appDiv.style.background = appState.settings.bgColor;
          appDiv.style.backgroundImage = 'none';
        } else if (appState.settings.bgType === 'image' && appState.settings.bgImage) {
          appDiv.style.background = `url('${appState.settings.bgImage}') center / cover no-repeat`;
        }

        // blur
        const blurValue = appState.settings.blur ? `blur(${appState.settings.blur}px)` : 'none';
        appDiv.style.setProperty('--blur-value', blurValue);
      }

      // cek deadline besok dan tampilkan notifikasi (toast)
      function checkDeadlinesAndNotify() {
        const now = new Date();
        const tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
        const tasks = appState.tasks.filter(t => {
          if (t.selesai && t.dikumpul) return false; // abaikan yg sudah selesai & kumpul
          const deadline = new Date(t.deadline);
          return deadline > now && deadline <= tomorrow;
        });
        if (tasks.length > 0) {
          const msg = `${tasks.length} tugas tenggat besok!`;
          showToast(msg);
        }
      }

      function showToast(msg, duration = 4000) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
      }

      // urutkan tasks berdasarkan sortBy
      function getSortedTasks() {
        let sorted = [...appState.tasks];
        if (appState.sortBy === 'deadline') {
          sorted.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
        } else if (appState.sortBy === 'difficulty') {
          const level = { 'susah': 0, 'sedang': 1, 'mudah': 2, '': 3 };
          sorted.sort((a, b) => (level[a.kesulitan] || 3) - (level[b.kesulitan] || 3));
        }
        // default: urut id descending (terbaru di atas)
        else {
          sorted.sort((a, b) => (b.id || 0) - (a.id || 0));
        }
        return sorted;
      }

      // ---------- RENDER PAGES ----------
      function render() {
        const appDiv = document.getElementById('app');
        if (!appDiv) return;

        let html = '';

        // header dinamis
        const headerTitle = appState.currentPage === 'home' ? 'Tugas' :
                            appState.currentPage === 'add' ? (appState.editTaskId ? 'Edit Tugas' : 'Tambah Tugas') :
                            appState.currentPage === 'settings' ? 'Pengaturan' : 'Setup Awal';

        html += `
          <div class="app-header">
            <h1>${headerTitle}</h1>
            ${appState.currentPage !== 'setup' ? '<i class="fas fa-sliders-h" onclick="window.goToPage(\'settings\')"></i>' : ''}
          </div>
          <div class="app-main" id="app-main">
        `;

        // konten sesuai halaman
        if (appState.currentPage === 'setup') {
          html += renderSetup();
        } else if (appState.currentPage === 'home') {
          html += renderHome();
        } else if (appState.currentPage === 'add') {
          html += renderAddEdit();
        } else if (appState.currentPage === 'settings') {
          html += renderSettings();
        }

        html += `</div>`; // tutup app-main

        // bottom navigation (kecuali setup)
        if (appState.currentPage !== 'setup') {
          html += `
            <div class="bottom-nav">
              <div class="nav-item ${appState.currentPage === 'home' ? 'active' : ''}" onclick="window.goToPage('home')">
                <i class="fas fa-tasks"></i>
                <span>Home</span>
              </div>
              <div class="nav-item ${appState.currentPage === 'add' ? 'active' : ''}" onclick="window.goToPage('add')">
                <i class="fas fa-plus-circle"></i>
                <span>Tambah</span>
              </div>
              <div class="nav-item ${appState.currentPage === 'settings' ? 'active' : ''}" onclick="window.goToPage('settings')">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
              </div>
            </div>
          `;
        }

        appDiv.innerHTML = html;

        // tambahan event listener untuk form dll dilakukan setelah render
        attachEvents();

        // terapkan tema dan background
        applyThemeAndBackground();

        // cek deadline setelah render
        if (appState.currentPage !== 'setup') {
          checkDeadlinesAndNotify();
        }
      }

      // ---- HALAMAN SETUP ----
      function renderSetup() {
        return `
          <div style="padding: 20px 0;">
            <h2 style="color: var(--text-primary); margin-bottom: 20px;">Halo! Kenalan dulu 👋</h2>
            <div class="form-group">
              <label>Nama panggilan</label>
              <input type="text" id="nickname-input" class="form-control" placeholder="Contoh: Andi" value="${appState.nickname || ''}">
            </div>
            <div class="form-group">
              <label>Mata Kuliah (pisahkan dengan koma)</label>
              <input type="text" id="matkul-input" class="form-control" placeholder="Matematika, Fisika, Kimia" value="${appState.mataKuliah.join(', ')}">
            </div>
            <button class="btn" id="save-setup">Simpan & Mulai</button>
          </div>
        `;
      }

      // ---- HALAMAN HOME (DAFTAR TUGAS) ----
      function renderHome() {
        const sorted = getSortedTasks();
        const tasksHtml = sorted.map(task => {
          const deadlineDate = new Date(task.deadline);
          const formatted = deadlineDate.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
          const selesaiChecked = task.selesai ? 'checked' : '';
          const dikumpulChecked = task.dikumpul ? 'checked' : '';

          return `
            <div class="task-card" data-task-id="${task.id}">
              <div class="task-header">
                <span class="task-matkul">${task.matkul}</span>
                <div class="task-actions">
                  <i class="fas fa-edit" onclick="window.editTask('${task.id}')"></i>
                  <i class="fas fa-trash" onclick="window.deleteTask('${task.id}')"></i>
                </div>
              </div>
              <div class="task-title">${task.nama}</div>
              <div class="task-desc">${task.deskripsi || '-'}</div>
              <div class="task-deadline"><i class="far fa-calendar-alt"></i> ${formatted}</div>
              <div class="task-meta">
                ${task.kesulitan ? `<span>${task.kesulitan}</span>` : ''}
                <span>${task.kelompok ? 'Kelompok' : 'Individu'}</span>
              </div>
              <div class="task-check-row">
                <label><input type="checkbox" class="task-selesai" data-id="${task.id}" ${selesaiChecked}> Selesai</label>
                <label><input type="checkbox" class="task-dikumpul" data-id="${task.id}" ${dikumpulChecked}> Dikumpul</label>
              </div>
            </div>
          `;
        }).join('') || '<p style="color: var(--text-secondary); text-align: center;">Belum ada tugas. Yuk tambah!</p>';

        // dropdown urut
        return `
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <span style="color: var(--text-secondary);">Urutkan:</span>
            <select id="sort-select" class="form-control" style="width: auto; padding: 8px;">
              <option value="default" ${appState.sortBy === 'default' ? 'selected' : ''}>Default</option>
              <option value="deadline" ${appState.sortBy === 'deadline' ? 'selected' : ''}>Tenggat terdekat</option>
              <option value="difficulty" ${appState.sortBy === 'difficulty' ? 'selected' : ''}>Tingkat kesulitan</option>
            </select>
          </div>
          <div class="task-list">
            ${tasksHtml}
          </div>
        `;
      }

      // ---- HALAMAN TAMBAH/EDIT TUGAS ----
      function renderAddEdit() {
        const editId = appState.editTaskId;
        const task = editId ? appState.tasks.find(t => t.id == editId) : null;

        const matkulOptions = appState.mataKuliah.map(m => `<option value="${m}" ${task && task.matkul === m ? 'selected' : ''}>${m}</option>`).join('');

        return `
          <form id="task-form">
            <div class="form-group">
              <label>Mata Kuliah</label>
              <select id="task-matkul" class="form-control" required>
                <option value="">Pilih matkul</option>
                ${matkulOptions}
              </select>
            </div>
            <div class="form-group">
              <label>Nama Tugas</label>
              <input type="text" id="task-nama" class="form-control" value="${task ? task.nama : ''}" required>
            </div>
            <div class="form-group">
              <label>Deskripsi</label>
              <textarea id="task-desc" class="form-control" rows="2">${task ? task.deskripsi || '' : ''}</textarea>
            </div>
            <div class="form-group">
              <label>Tenggat Waktu</label>
              <input type="datetime-local" id="task-deadline" class="form-control" value="${task ? task.deadline.slice(0,16) : ''}" required>
            </div>
            <div class="form-group">
              <label>Tingkat Kesulitan</label>
              <select id="task-difficulty" class="form-control">
                <option value="" ${task && !task.kesulitan ? 'selected' : ''}>- Kosong -</option>
                <option value="mudah" ${task && task.kesulitan === 'mudah' ? 'selected' : ''}>Mudah</option>
                <option value="sedang" ${task && task.kesulitan === 'sedang' ? 'selected' : ''}>Sedang</option>
                <option value="susah" ${task && task.kesulitan === 'susah' ? 'selected' : ''}>Susah</option>
              </select>
            </div>
            <div class="form-group">
              <label>Jenis</label>
              <div class="row">
                <label><input type="radio" name="kelompok" value="individu" ${task ? (task.kelompok ? '' : 'checked') : 'checked'}> Individu</label>
                <label><input type="radio" name="kelompok" value="kelompok" ${task && task.kelompok ? 'checked' : ''}> Kelompok</label>
              </div>
            </div>
            <button type="submit" class="btn">${editId ? 'Update' : 'Simpan'} Tugas</button>
            ${editId ? '<button type="button" class="btn btn-outline" style="margin-top:8px;" onclick="window.goToPage(\'home\')">Batal</button>' : ''}
          </form>
        `;
      }

      // ---- HALAMAN SETTINGS ----
      function renderSettings() {
        const presetColors = ['#f8fafc', '#f1f5f9', '#ffffff', '#000000', '#0f172a', '#1e293b', '#3b82f6', '#f97316', '#10b981'];
        const colorCircles = presetColors.map(c => 
          `<div class="color-circle ${appState.settings.bgColor === c ? 'selected' : ''}" style="background:${c};" onclick="window.setBgColor('${c}')"></div>`
        ).join('');

        return `
          <div class="setting-item">
            <h3 style="margin-bottom: 12px;">Tampilan</h3>
            <div class="form-group">
              <label>Tema</label>
              <select id="theme-select" class="form-control">
                <option value="light" ${appState.settings.theme === 'light' ? 'selected' : ''}>Terang</option>
                <option value="dark" ${appState.settings.theme === 'dark' ? 'selected' : ''}>Gelap</option>
              </select>
            </div>
            <div class="form-group">
              <label>Jenis Latar</label>
              <select id="bg-type" class="form-control">
                <option value="color" ${appState.settings.bgType === 'color' ? 'selected' : ''}>Warna Solid</option>
                <option value="image" ${appState.settings.bgType === 'image' ? 'selected' : ''}>Gambar</option>
              </select>
            </div>
            <div id="bg-color-picker" class="color-picker">
              ${colorCircles}
            </div>
            <div id="bg-image-upload" class="${appState.settings.bgType === 'image' ? '' : 'hidden'}">
              <input type="file" id="bg-file" accept="image/*" class="form-control" style="padding:8px;">
              <p class="text-small" style="margin-top:8px;">Pilih gambar dari perangkat</p>
            </div>
            <div class="form-group">
              <label>Blur: ${appState.settings.blur}px</label>
              <input type="range" id="blur-range" min="0" max="10" step="1" value="${appState.settings.blur}" class="blur-slider">
            </div>
          </div>
          <div class="setting-item">
            <h3>Profil</h3>
            <div class="form-group">
              <label>Nama Panggilan</label>
              <input type="text" id="nickname-settings" class="form-control" value="${appState.nickname}">
            </div>
            <div class="form-group">
              <label>Mata Kuliah (pisahkan koma)</label>
              <input type="text" id="matkul-settings" class="form-control" value="${appState.mataKuliah.join(', ')}">
            </div>
            <button class="btn" id="save-profile">Simpan Profil</button>
          </div>
          <div style="height:20px;"></div>
        `;
      }

      // ---------- EVENT HANDLERS ----------
      function attachEvents() {
        // Setup
        const saveSetup = document.getElementById('save-setup');
        if (saveSetup) {
          saveSetup.addEventListener('click', () => {
            const nickname = document.getElementById('nickname-input').value.trim();
            const matkulStr = document.getElementById('matkul-input').value.trim();
            if (!nickname) {
              showToast('Nama panggilan harus diisi');
              return;
            }
            appState.nickname = nickname;
            appState.mataKuliah = matkulStr ? matkulStr.split(',').map(s => s.trim()).filter(s => s) : [];
            appState.currentPage = 'home';
            saveState();
            render();
          });
        }

        // Home: sort
        const sortSelect = document.getElementById('sort-select');
        if (sortSelect) {
          sortSelect.addEventListener('change', (e) => {
            appState.sortBy = e.target.value;
            saveState();
            render();
          });
        }

        // Home: checkbox selesai/dikumpul
        document.querySelectorAll('.task-selesai').forEach(cb => {
          cb.addEventListener('change', (e) => {
            const id = e.target.dataset.id;
            const task = appState.tasks.find(t => t.id == id);
            if (task) {
              task.selesai = e.target.checked;
              saveState();
            }
          });
        });
        document.querySelectorAll('.task-dikumpul').forEach(cb => {
          cb.addEventListener('change', (e) => {
            const id = e.target.dataset.id;
            const task = appState.tasks.find(t => t.id == id);
            if (task) {
              task.dikumpul = e.target.checked;
              saveState();
            }
          });
        });

        // Add/Edit form
        const taskForm = document.getElementById('task-form');
        if (taskForm) {
          taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const matkul = document.getElementById('task-matkul').value;
            const nama = document.getElementById('task-nama').value;
            const deskripsi = document.getElementById('task-desc').value;
            const deadline = document.getElementById('task-deadline').value;
            const kesulitan = document.getElementById('task-difficulty').value;
            const kelompok = document.querySelector('input[name="kelompok"]:checked').value === 'kelompok';

            if (!matkul || !nama || !deadline) {
              showToast('Lengkapi data wajib');
              return;
            }

            const taskData = {
              matkul, nama, deskripsi, deadline,
              kesulitan, kelompok,
              selesai: false, dikumpul: false,
            };

            if (appState.editTaskId) {
              // update
              const index = appState.tasks.findIndex(t => t.id == appState.editTaskId);
              if (index !== -1) {
                appState.tasks[index] = { ...appState.tasks[index], ...taskData };
              }
              appState.editTaskId = null;
            } else {
              // create
              const newId = Date.now() + Math.random();
              appState.tasks.push({ id: newId, ...taskData });
            }

            saveState();
            appState.currentPage = 'home';
            render();
          });
        }

        // Settings
        const themeSelect = document.getElementById('theme-select');
        if (themeSelect) {
          themeSelect.addEventListener('change', (e) => {
            appState.settings.theme = e.target.value;
            saveState();
            applyThemeAndBackground();
          });
        }

        const bgType = document.getElementById('bg-type');
        if (bgType) {
          bgType.addEventListener('change', (e) => {
            appState.settings.bgType = e.target.value;
            if (e.target.value === 'color') {
              document.getElementById('bg-image-upload').classList.add('hidden');
            } else {
              document.getElementById('bg-image-upload').classList.remove('hidden');
            }
            saveState();
            applyThemeAndBackground();
          });
        }

        const blurRange = document.getElementById('blur-range');
        if (blurRange) {
          blurRange.addEventListener('input', (e) => {
            appState.settings.blur = parseInt(e.target.value);
            document.querySelector('label[for="blur-range"]').innerText = `Blur: ${appState.settings.blur}px`;
            saveState();
            applyThemeAndBackground();
          });
        }

        const bgFile = document.getElementById('bg-file');
        if (bgFile) {
          bgFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (event) => {
                appState.settings.bgImage = event.target.result;
                appState.settings.bgType = 'image';
                saveState();
                applyThemeAndBackground();
              };
              reader.readAsDataURL(file);
            }
          });
        }

        const saveProfile = document.getElementById('save-profile');
        if (saveProfile) {
          saveProfile.addEventListener('click', () => {
            const nickname = document.getElementById('nickname-settings').value.trim();
            const matkulStr = document.getElementById('matkul-settings').value.trim();
            if (nickname) appState.nickname = nickname;
            appState.mataKuliah = matkulStr ? matkulStr.split(',').map(s => s.trim()).filter(s => s) : [];
            saveState();
            showToast('Profil tersimpan');
          });
        }
      }

      // fungsi global untuk navigasi dll
      window.goToPage = (page) => {
        if (page === 'add') {
          appState.editTaskId = null; // reset edit
        }
        appState.currentPage = page;
        render();
      };

      window.editTask = (id) => {
        appState.editTaskId = id;
        appState.currentPage = 'add';
        render();
      };

      window.deleteTask = (id) => {
        if (confirm('Hapus tugas ini?')) {
          appState.tasks = appState.tasks.filter(t => t.id != id);
          saveState();
          render();
        }
      };

      window.setBgColor = (color) => {
        appState.settings.bgColor = color;
        appState.settings.bgType = 'color';
        saveState();
        applyThemeAndBackground();
        render(); // untuk update selected class
      };

      // inisialisasi render pertama
      render();

      // cek deadline tiap kali halaman home aktif (sudah di dalam render)
    })();
  </script>
</body>
</html>
