<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>StudyMate · Student Planner</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Favicon SVG (buku, jam, lampu) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233b82f6' rx='20'/%3E%3Cpath d='M25 30 L45 30 L45 70 L25 70 Q20 70 20 65 L20 35 Q20 30 25 30' fill='white' opacity='0.9'/%3E%3Crect x='48' y='35' width='25' height='35' rx='4' fill='white' opacity='0.9'/%3E%3Ccircle cx='70' cy='52' r='12' fill='none' stroke='white' stroke-width='4' /%3E%3Cpath d='M70 46 L70 54 L76 58' stroke='white' stroke-width='4' fill='none' /%3E%3Cpath d='M32 75 L42 75 L37 85 Z' fill='%23fbbf24' /%3E%3C/svg%3E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--body-bg);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Latar belakang dengan blur */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit;
      filter: var(--body-blur, none);
      z-index: -1;
    }

    :root {
      --body-blur: none;
      --app-opacity: 0.85;
    }

    #app {
      width: 100%;
      max-width: 450px;
      height: 90vh;
      max-height: 800px;
      background: rgba(var(--app-bg-rgb), var(--app-opacity));
      border-radius: 32px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      transition: background 0.2s;
    }

    .theme-light {
      --app-bg-rgb: 255, 255, 255;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --border: #cbd5e1;
      --card-bg-rgb: 255, 255, 255;
      --accent: #3b82f6;
      --accent-soft: #dbeafe;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    .theme-dark {
      --app-bg-rgb: 15, 23, 42;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: #475569;
      --card-bg-rgb: 30, 41, 59;
      --accent: #60a5fa;
      --accent-soft: #1e3a8a;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5);
    }

    .app-header {
      padding: 20px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .app-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .app-header i {
      font-size: 1.4rem;
      color: var(--accent);
      cursor: pointer;
    }
    .app-main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
      background: rgba(var(--app-bg-rgb), 0.95);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.7rem;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-item.active {
      color: var(--accent);
    }
    .nav-item i {
      font-size: 1.3rem;
    }
    .card {
      background: rgba(var(--card-bg-rgb), 0.7);
      backdrop-filter: blur(2px);
      border-radius: 24px;
      padding: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }
    .task-header, .schedule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .matkul-badge {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .task-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
      margin: 6px 0 4px;
    }
    .task-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
      white-space: pre-wrap;
      margin: 6px 0;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.7rem;
      margin: 8px 0;
    }
    .task-meta span {
      background: rgba(var(--app-bg-rgb), 0.5);
      padding: 4px 10px;
      border-radius: 30px;
    }
    .task-check-row {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }
    .task-check-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .btn-icon {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--text-secondary);
      margin-left: 8px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .form-control, select, textarea, input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(var(--app-bg-rgb), 0.8);
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: border 0.2s;
    }
    /* Agar border selalu terlihat jelas */
    .form-control:focus, select:focus, textarea:focus, input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(var(--accent-rgb, 59,130,246), 0.3);
    }
    textarea {
      resize: vertical;
    }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      font-size: 1rem;
      cursor: pointer;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .sort-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .sort-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .sort-group select {
      width: auto;
      padding: 8px 12px;
    }
    .sort-direction {
      display: flex;
      gap: 4px;
    }
    .sort-direction button {
      background: rgba(var(--app-bg-rgb), 0.8);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 10px;
      cursor: pointer;
      color: var(--text-primary);
    }
    .sort-direction button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .empty-state {
      text-align: center;
      padding: 30px;
      color: var(--text-secondary);
    }
    .schedule-item {
      margin-bottom: 12px;
    }
    .color-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: inline-block;
      margin: 4px;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .color-circle.selected {
      border-color: var(--accent);
    }
    .hidden {
      display: none;
    }

    /* Modal styling */
    .modal-container {
      background: rgba(var(--app-bg-rgb), 0.95);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      width: 90%;
      max-width: 380px;
      padding: 20px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    /* Radio group styling */
    .radio-group {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-top: 8px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .radio-group input[type="radio"] {
      width: auto;
      margin: 0;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  (function() {
    // ---------- STATE ----------
    let appState = {
      currentPage: 'tasks',
      tasks: [],
      schedules: [],
      settings: {
        theme: 'light',
        bgType: 'color',
        bgColor: '#f1f5f9',
        bgImage: null,
        appOpacity: 0.85,
        bodyBlur: 0,
      },
      sortTasks: {
        by: 'default',
        deadlineDir: 'asc',
        difficultyDir: 'asc',
      }
    };

    function saveState() {
      localStorage.setItem('studymate_v6', JSON.stringify(appState));
    }

    function loadState() {
      try {
        const saved = localStorage.getItem('studymate_v6');
        if (saved) {
          const parsed = JSON.parse(saved);
          appState = { ...appState, ...parsed };
          if (!appState.tasks) appState.tasks = [];
          if (!appState.schedules) appState.schedules = [];
          if (!appState.sortTasks) appState.sortTasks = { by: 'default', deadlineDir: 'asc', difficultyDir: 'asc' };
          if (!appState.settings) appState.settings = { theme: 'light', bgType: 'color', bgColor: '#f1f5f9', bgImage: null, appOpacity: 0.85, bodyBlur: 0 };
        }
      } catch(e) {}
      // Data awal kosong
    }

    // Apply appearance (theme, background, opacity, blur) langsung tanpa render ulang
    function applyAppearance() {
      const root = document.documentElement;
      const body = document.body;
      const appDiv = document.getElementById('app');
      if (appDiv) {
        appDiv.classList.remove('theme-light', 'theme-dark');
        appDiv.classList.add(`theme-${appState.settings.theme}`);
      }
      if (appState.settings.bgType === 'color') {
        body.style.background = appState.settings.bgColor;
        body.style.backgroundImage = 'none';
      } else if (appState.settings.bgType === 'image' && appState.settings.bgImage) {
        body.style.background = `url('${appState.settings.bgImage}') center/cover no-repeat fixed`;
      }
      root.style.setProperty('--body-blur', appState.settings.bodyBlur ? `blur(${appState.settings.bodyBlur}px)` : 'none');
      root.style.setProperty('--app-opacity', appState.settings.appOpacity);
    }

    // Helper: update slider label secara langsung
    function updateSliderLabels() {
      const blurLabel = document.querySelector('label[for="blur-range"]');
      if (blurLabel) blurLabel.innerText = `Keburaman Latar (blur) ${appState.settings.bodyBlur}px`;
      const opacityLabel = document.querySelector('label[for="opacity-range"]');
      if (opacityLabel) opacityLabel.innerText = `Transparansi Aplikasi ${Math.round(appState.settings.appOpacity*100)}%`;
    }

    // Sorting tasks
    function sortTasksList(tasks) {
      const { by, deadlineDir, difficultyDir } = appState.sortTasks;
      if (by === 'default') return [...tasks].sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
      if (by === 'deadline') {
        return [...tasks].sort((a,b) => {
          const da = new Date(a.deadline).getTime();
          const db = new Date(b.deadline).getTime();
          return deadlineDir === 'asc' ? da - db : db - da;
        });
      }
      if (by === 'difficulty') {
        const rank = { 'mudah': 1, 'sedang': 2, 'susah': 3, '': 0 };
        return [...tasks].sort((a,b) => {
          const ra = rank[a.kesulitan] || 0;
          const rb = rank[b.kesulitan] || 0;
          return difficultyDir === 'asc' ? ra - rb : rb - ra;
        });
      }
      return tasks;
    }

    function getLecturerByMatkul(matkul) {
      const schedule = appState.schedules.find(s => s.matkul === matkul);
      return schedule ? schedule.lecturer : '';
    }

    function renderTaskCard(task, isHistory) {
      const deadlineDate = new Date(task.deadline);
      const formattedDeadline = deadlineDate.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
      let givenFormatted = '-';
      if (task.tanggal_diberikan) {
        const givenDate = new Date(task.tanggal_diberikan);
        givenFormatted = givenDate.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
      }
      const difficultyMap = { mudah: '🟢 Mudah', sedang: '🟡 Sedang', susah: '🔴 Susah' };
      const difficultyText = task.kesulitan ? difficultyMap[task.kesulitan] || task.kesulitan : '-';
      const kelompokText = task.kelompok ? '👥 Kelompok' : '👤 Individu';
      return `
        <div class="card" data-task-id="${task.id}">
          <div class="task-header">
            <span class="matkul-badge">${escapeHtml(task.matkul)}</span>
            <div>
              <i class="fas fa-edit btn-icon" onclick="window.editTask('${task.id}')"></i>
              <i class="fas fa-trash btn-icon" onclick="window.deleteTask('${task.id}')"></i>
            </div>
          </div>
          <div class="task-title">${escapeHtml(task.nama)}</div>
          <div class="task-desc">${escapeHtml(task.deskripsi).replace(/\n/g, '<br>')}</div>
          <div class="task-meta">
            <span><i class="far fa-calendar-alt"></i> Tenggat: ${formattedDeadline}</span>
            <span><i class="far fa-calendar-check"></i> Diberikan: ${givenFormatted}</span>
            <span>📚 ${difficultyText}</span>
            <span>${kelompokText}</span>
            ${task.dosen ? `<span>👨‍🏫 ${escapeHtml(task.dosen)}</span>` : ''}
          </div>
          ${!isHistory ? `
          <div class="task-check-row">
            <label><input type="checkbox" class="task-selesai" data-id="${task.id}" ${task.selesai ? 'checked' : ''}> Selesai</label>
            <label><input type="checkbox" class="task-dikumpul" data-id="${task.id}" ${task.dikumpul ? 'checked' : ''}> Dikumpul</label>
          </div>
          ` : `
          <div class="task-check-row">
            <span><i class="fas fa-check-circle"></i> Selesai ✓</span>
            ${task.dikumpul ? '<span><i class="fas fa-box"></i> Sudah dikumpul</span>' : '<span>Belum dikumpul</span>'}
          </div>
          `}
        </div>
      `;
    }

    function render() {
      const appDiv = document.getElementById('app');
      if (!appDiv) return;
      let pageTitle = '';
      if (appState.currentPage === 'tasks') pageTitle = 'Tugas Aktif';
      else if (appState.currentPage === 'history') pageTitle = 'Riwayat Tugas';
      else if (appState.currentPage === 'schedule') pageTitle = 'Jadwal Kuliah';
      else pageTitle = 'Pengaturan';

      let html = `
        <div class="app-header">
          <h1>${pageTitle}</h1>
          <i class="fas fa-cog" onclick="window.navigateTo('settings')"></i>
        </div>
        <div class="app-main">
      `;

      if (appState.currentPage === 'tasks') html += renderTasksPage();
      else if (appState.currentPage === 'history') html += renderHistoryPage();
      else if (appState.currentPage === 'schedule') html += renderSchedulePage();
      else if (appState.currentPage === 'settings') html += renderSettingsPage();

      html += `</div><div class="bottom-nav">`;
      const pages = [
        { id: 'tasks', icon: 'fas fa-tasks', label: 'Tugas' },
        { id: 'history', icon: 'fas fa-history', label: 'Riwayat' },
        { id: 'schedule', icon: 'fas fa-calendar-week', label: 'Jadwal' },
        { id: 'settings', icon: 'fas fa-sliders-h', label: 'Setelan' }
      ];
      pages.forEach(p => {
        html += `
          <div class="nav-item ${appState.currentPage === p.id ? 'active' : ''}" onclick="window.navigateTo('${p.id}')">
            <i class="${p.icon}"></i>
            <span>${p.label}</span>
          </div>
        `;
      });
      html += `</div>`;
      appDiv.innerHTML = html;
      applyAppearance();
      attachDynamicEvents();
    }

    function renderTasksPage() {
      let activeTasks = appState.tasks.filter(t => !t.selesai);
      activeTasks = sortTasksList(activeTasks);
      if (activeTasks.length === 0) {
        return `<div class="empty-state"><i class="fas fa-check-circle"></i> <p>Belum ada tugas aktif. Yuk tambah!</p><button class="btn" style="margin-top:12px;" onclick="window.openAddTask()">+ Tambah Tugas Baru</button></div>`;
      }
      let sortHtml = `
        <div class="sort-bar">
          <div class="sort-group">
            <span>Urut:</span>
            <select id="sort-by">
              <option value="default" ${appState.sortTasks.by === 'default' ? 'selected' : ''}>Default</option>
              <option value="deadline" ${appState.sortTasks.by === 'deadline' ? 'selected' : ''}>Tenggat</option>
              <option value="difficulty" ${appState.sortTasks.by === 'difficulty' ? 'selected' : ''}>Kesulitan</option>
            </select>
          </div>
          ${appState.sortTasks.by !== 'default' ? `
          <div class="sort-direction">
            <button id="sort-asc" class="${appState.sortTasks.by === 'deadline' ? (appState.sortTasks.deadlineDir === 'asc' ? 'active' : '') : (appState.sortTasks.difficultyDir === 'asc' ? 'active' : '')}"><i class="fas fa-sort-amount-up-alt"></i></button>
            <button id="sort-desc" class="${appState.sortTasks.by === 'deadline' ? (appState.sortTasks.deadlineDir === 'desc' ? 'active' : '') : (appState.sortTasks.difficultyDir === 'desc' ? 'active' : '')}"><i class="fas fa-sort-amount-down-alt"></i></button>
          </div>
          ` : ''}
          <button class="btn-icon" onclick="window.openAddTask()"><i class="fas fa-plus-circle"></i></button>
        </div>
        <div id="task-list">
      `;
      activeTasks.forEach(task => {
        sortHtml += renderTaskCard(task, false);
      });
      sortHtml += `</div>`;
      return sortHtml;
    }

    function renderHistoryPage() {
      let completedTasks = appState.tasks.filter(t => t.selesai === true);
      if (completedTasks.length === 0) return `<div class="empty-state"><i class="fas fa-archive"></i><p>Belum ada tugas yang selesai</p></div>`;
      let html = `<div class="sort-bar"><span>Riwayat penyelesaian</span></div>`;
      completedTasks.forEach(task => {
        html += renderTaskCard(task, true);
      });
      return html;
    }

    function renderSchedulePage() {
      let schedulesHtml = `<div style="margin-bottom:12px;"><button class="btn" onclick="window.openAddSchedule()"><i class="fas fa-plus"></i> Tambah Jadwal</button></div>`;
      if (appState.schedules.length === 0) schedulesHtml += `<div class="empty-state">Belum ada jadwal. Tambahkan sekarang!</div>`;
      appState.schedules.forEach(sch => {
        schedulesHtml += `
          <div class="card schedule-item">
            <div class="schedule-header">
              <strong>${escapeHtml(sch.matkul)}</strong>
              <div>
                <i class="fas fa-edit btn-icon" onclick="window.editSchedule('${sch.id}')"></i>
                <i class="fas fa-trash btn-icon" onclick="window.deleteSchedule('${sch.id}')"></i>
              </div>
            </div>
            <div><i class="far fa-calendar-alt"></i> ${sch.day} · ${sch.time || '-'}</div>
            <div><i class="fas fa-chalkboard-user"></i> Dosen: ${escapeHtml(sch.lecturer || '-')}</div>
          </div>
        `;
      });
      return schedulesHtml;
    }

    function renderSettingsPage() {
      const presetColors = ['#f8fafc', '#ffffff', '#0f172a', '#1e293b', '#3b82f6', '#f97316', '#10b981'];
      let colorCircles = presetColors.map(c => 
        `<div class="color-circle ${appState.settings.bgColor === c && appState.settings.bgType === 'color' ? 'selected' : ''}" style="background:${c};" onclick="window.setBgColor('${c}')"></div>`
      ).join('');
      return `
        <div class="card">
          <h3>Tampilan</h3>
          <div class="form-group">
            <label>Tema</label>
            <select id="theme-settings">
              <option value="light" ${appState.settings.theme === 'light' ? 'selected' : ''}>Terang</option>
              <option value="dark" ${appState.settings.theme === 'dark' ? 'selected' : ''}>Gelap</option>
            </select>
          </div>
          <div class="form-group">
            <label>Jenis Latar</label>
            <select id="bg-type-settings">
              <option value="color" ${appState.settings.bgType === 'color' ? 'selected' : ''}>Warna Solid</option>
              <option value="image" ${appState.settings.bgType === 'image' ? 'selected' : ''}>Gambar</option>
            </select>
          </div>
          <div id="color-picker-area" class="${appState.settings.bgType === 'color' ? '' : 'hidden'}">
            <label>Warna Latar</label>
            <div class="row">${colorCircles}</div>
          </div>
          <div id="image-picker-area" class="${appState.settings.bgType === 'image' ? '' : 'hidden'}">
            <label>Upload Gambar</label>
            <input type="file" id="bg-image-input" accept="image/*">
          </div>
          <div class="form-group">
            <label for="blur-range">Keburaman Latar (blur) ${appState.settings.bodyBlur}px</label>
            <input type="range" id="blur-range" min="0" max="20" step="1" value="${appState.settings.bodyBlur}">
          </div>
          <div class="form-group">
            <label for="opacity-range">Transparansi Aplikasi ${Math.round(appState.settings.appOpacity*100)}%</label>
            <input type="range" id="opacity-range" min="0.4" max="1" step="0.01" value="${appState.settings.appOpacity}">
          </div>
          <h3>Manajemen Mata Kuliah</h3>
          <div id="matkul-list">
            ${(() => {
              const uniqueMatkul = [...new Set(appState.schedules.map(s => s.matkul))];
              if (uniqueMatkul.length === 0) return '<p>Belum ada mata kuliah di jadwal</p>';
              return uniqueMatkul.map(m => `<div>📘 ${m}</div>`).join('');
            })()}
          </div>
          <button class="btn" id="reset-data" style="margin-top:12px; background:#ef4444;">Reset Semua Data</button>
        </div>
      `;
    }

    // Event handlers dinamis
    function attachDynamicEvents() {
      // Checkbox selesai/dikumpul
      document.querySelectorAll('.task-selesai').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const id = e.target.dataset.id;
          const task = appState.tasks.find(t => t.id == id);
          if (task) {
            task.selesai = e.target.checked;
            saveState();
            render();
          }
        });
      });
      document.querySelectorAll('.task-dikumpul').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const id = e.target.dataset.id;
          const task = appState.tasks.find(t => t.id == id);
          if (task) {
            task.dikumpul = e.target.checked;
            saveState();
          }
        });
      });

      // Sorting controls
      const sortBy = document.getElementById('sort-by');
      if (sortBy) sortBy.addEventListener('change', (e) => { appState.sortTasks.by = e.target.value; saveState(); render(); });
      const ascBtn = document.getElementById('sort-asc');
      const descBtn = document.getElementById('sort-desc');
      if (ascBtn) {
        ascBtn.addEventListener('click', () => {
          if (appState.sortTasks.by === 'deadline') appState.sortTasks.deadlineDir = 'asc';
          else if (appState.sortTasks.by === 'difficulty') appState.sortTasks.difficultyDir = 'asc';
          saveState();
          render();
        });
      }
      if (descBtn) {
        descBtn.addEventListener('click', () => {
          if (appState.sortTasks.by === 'deadline') appState.sortTasks.deadlineDir = 'desc';
          else if (appState.sortTasks.by === 'difficulty') appState.sortTasks.difficultyDir = 'desc';
          saveState();
          render();
        });
      }

      // Settings handlers (dengan live update tanpa render ulang)
      const themeSel = document.getElementById('theme-settings');
      if (themeSel) themeSel.addEventListener('change', (e) => { appState.settings.theme = e.target.value; saveState(); applyAppearance(); render(); });
      const bgTypeSel = document.getElementById('bg-type-settings');
      if (bgTypeSel) bgTypeSel.addEventListener('change', (e) => {
        appState.settings.bgType = e.target.value;
        saveState();
        render();
      });
      const blurRange = document.getElementById('blur-range');
      if (blurRange) {
        blurRange.addEventListener('input', (e) => {
          appState.settings.bodyBlur = parseInt(e.target.value);
          saveState();
          applyAppearance();
          updateSliderLabels();
        });
      }
      const opacityRange = document.getElementById('opacity-range');
      if (opacityRange) {
        opacityRange.addEventListener('input', (e) => {
          appState.settings.appOpacity = parseFloat(e.target.value);
          saveState();
          applyAppearance();
          updateSliderLabels();
        });
      }
      const bgImageInput = document.getElementById('bg-image-input');
      if (bgImageInput) bgImageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => { appState.settings.bgImage = ev.target.result; appState.settings.bgType = 'image'; saveState(); applyAppearance(); render(); };
          reader.readAsDataURL(file);
        }
      });
      const resetBtn = document.getElementById('reset-data');
      if (resetBtn) resetBtn.addEventListener('click', () => { if(confirm('Hapus semua data? Tugas dan jadwal akan hilang.')) { localStorage.removeItem('studymate_v6'); location.reload(); } });
    }

    // Modal tugas (tanpa opsi tambah matkul baru)
    function showTaskFormModal(taskId) {
      const task = taskId ? appState.tasks.find(t => t.id == taskId) : null;
      // Cek apakah ada jadwal
      if (appState.schedules.length === 0) {
        alert('Belum ada mata kuliah. Silakan tambah jadwal terlebih dahulu.');
        window.navigateTo('schedule');
        return;
      }
      let matkulOptions = '<option value="">-- Pilih Mata Kuliah --</option>';
      const uniqueMatkul = [...new Set(appState.schedules.map(s => s.matkul))];
      uniqueMatkul.forEach(m => {
        matkulOptions += `<option value="${escapeHtml(m)}" ${task && task.matkul === m ? 'selected' : ''}>${escapeHtml(m)}</option>`;
      });

      const modalHtml = `
        <div id="modal-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center;">
          <div class="modal-container">
            <h3>${task ? 'Edit Tugas' : 'Tugas Baru'}</h3>
            <form id="task-modal-form">
              <div class="form-group">
                <label>Mata Kuliah</label>
                <select id="task-matkul" required>${matkulOptions}</select>
              </div>
              <div class="form-group">
                <label>Nama Tugas</label>
                <input id="task-nama" value="${task ? escapeHtml(task.nama) : ''}" required>
              </div>
              <div class="form-group">
                <label>Deskripsi</label>
                <textarea id="task-desc" rows="3">${task ? escapeHtml(task.deskripsi) : ''}</textarea>
              </div>
              <div class="form-group">
                <label>Tanggal Diberikan (termasuk jam)</label>
                <input type="datetime-local" id="task-tgl-given" value="${task ? (task.tanggal_diberikan ? task.tanggal_diberikan.slice(0,16) : '') : ''}">
              </div>
              <div class="form-group">
                <label>Tenggat Waktu</label>
                <input type="datetime-local" id="task-deadline" value="${task ? (task.deadline ? task.deadline.slice(0,16) : '') : ''}" required>
              </div>
              <div class="form-group">
                <label>Tingkat Kesulitan</label>
                <select id="task-diff">
                  <option value="">-</option>
                  <option value="mudah" ${task?.kesulitan === 'mudah' ? 'selected' : ''}>Mudah</option>
                  <option value="sedang" ${task?.kesulitan === 'sedang' ? 'selected' : ''}>Sedang</option>
                  <option value="susah" ${task?.kesulitan === 'susah' ? 'selected' : ''}>Susah</option>
                </select>
              </div>
              <div class="form-group">
                <label>Jenis</label>
                <div class="radio-group">
                  <label><input type="radio" name="kelompok" value="individu" ${task ? (!task.kelompok ? 'checked' : '') : 'checked'}> Individu</label>
                  <label><input type="radio" name="kelompok" value="kelompok" ${task?.kelompok ? 'checked' : ''}> Kelompok</label>
                </div>
              </div>
              <button type="submit" class="btn">Simpan</button>
              <button type="button" class="btn-outline" style="margin-top:8px;" onclick="window.closeModal()">Batal</button>
            </form>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      
      const form = document.getElementById('task-modal-form');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const matkul = document.getElementById('task-matkul').value;
        const nama = document.getElementById('task-nama').value.trim();
        const deskripsi = document.getElementById('task-desc').value;
        const tanggal_diberikan = document.getElementById('task-tgl-given').value;
        const deadline = document.getElementById('task-deadline').value;
        const kesulitan = document.getElementById('task-diff').value;
        const kelompok = document.querySelector('input[name="kelompok"]:checked').value === 'kelompok';
        const dosen = getLecturerByMatkul(matkul);
        if (!matkul || !nama || !deadline) { alert('Lengkapi data wajib (mata kuliah, nama tugas, tenggat)'); return; }
        const taskData = { matkul, nama, deskripsi, tanggal_diberikan, deadline, kesulitan, kelompok, dosen, selesai: task ? task.selesai : false, dikumpul: task ? task.dikumpul : false, createdAt: task ? task.createdAt : Date.now() };
        if (task) {
          Object.assign(task, taskData);
        } else {
          appState.tasks.push({ id: Date.now(), ...taskData });
        }
        saveState();
        closeModal();
        render();
      });
    }

    // Modal jadwal
    function showScheduleModal(scheduleId) {
      const schedule = scheduleId ? appState.schedules.find(s => s.id == scheduleId) : null;
      const modalHtml = `
        <div id="modal-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center;">
          <div class="modal-container">
            <h3>${schedule ? 'Edit Jadwal' : 'Jadwal Baru'}</h3>
            <form id="schedule-modal-form">
              <div class="form-group">
                <label>Mata Kuliah</label>
                <input id="schedule-matkul" value="${schedule ? escapeHtml(schedule.matkul) : ''}" required>
              </div>
              <div class="form-group">
                <label>Hari</label>
                <select id="schedule-day">
                  <option>Senin</option><option>Selasa</option><option>Rabu</option><option>Kamis</option><option>Jumat</option><option>Sabtu</option><option>Minggu</option>
                </select>
              </div>
              <div class="form-group">
                <label>Jam (opsional, contoh: 10:00-12:00)</label>
                <input id="schedule-time" placeholder="10:00-12:00" value="${schedule ? schedule.time : ''}">
              </div>
              <div class="form-group">
                <label>Dosen</label>
                <input id="schedule-lecturer" value="${schedule ? escapeHtml(schedule.lecturer) : ''}">
              </div>
              <button type="submit" class="btn">Simpan</button>
              <button type="button" class="btn-outline" onclick="window.closeModal()">Batal</button>
            </form>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      if (schedule) {
        document.getElementById('schedule-day').value = schedule.day;
      }
      const form = document.getElementById('schedule-modal-form');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const matkul = document.getElementById('schedule-matkul').value.trim();
        const day = document.getElementById('schedule-day').value;
        const time = document.getElementById('schedule-time').value;
        const lecturer = document.getElementById('schedule-lecturer').value.trim();
        if (!matkul) return alert('Nama mata kuliah wajib');
        if (schedule) {
          schedule.matkul = matkul; schedule.day = day; schedule.time = time; schedule.lecturer = lecturer;
        } else {
          appState.schedules.push({ id: Date.now().toString(), matkul, day, time, lecturer });
        }
        saveState();
        closeModal();
        render();
      });
    }

    // Global functions
    window.navigateTo = (page) => { appState.currentPage = page; render(); };
    window.openAddTask = () => { showTaskFormModal(null); };
    window.editTask = (id) => { showTaskFormModal(id); };
    window.deleteTask = (id) => { if(confirm('Hapus tugas?')) { appState.tasks = appState.tasks.filter(t => t.id != id); saveState(); render(); } };
    window.openAddSchedule = () => { showScheduleModal(null); };
    window.editSchedule = (id) => { showScheduleModal(id); };
    window.deleteSchedule = (id) => { if(confirm('Hapus jadwal?')) { appState.schedules = appState.schedules.filter(s => s.id != id); saveState(); render(); } };
    window.setBgColor = (color) => { appState.settings.bgColor = color; appState.settings.bgType = 'color'; saveState(); applyAppearance(); render(); };
    window.closeModal = () => { const modal = document.getElementById('modal-overlay'); if(modal) modal.remove(); };

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }

    loadState();
    render();
  })();
</script>
</body>
</html>
